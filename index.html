<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leanopedija — Uskoro</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#0f1111;
  --card:#171919;
  --text:#f5f5f5;
  --muted:#a0a0a0;
  --green:#1a7a5e;
  --border:#2a2d2d;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.card{
  width:100%;
  max-width:720px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:56px;
  text-align:center;
}

.logo{
  width:72px;
  height:72px;
  margin:0 auto 24px;
  background:var(--green);
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:28px;
}

h1{
  font-family:'DM Serif Display',serif;
  font-size:52px;
  margin-bottom:16px;
}

p{
  color:var(--muted);
  line-height:1.8;
  font-size:18px;
}

.badge{
  display:inline-block;
  margin-top:28px;
  padding:8px 16px;
  border:1px solid rgba(26,122,94,0.4);
  color:#7fd6b7;
  border-radius:999px;
  font-size:14px;
}

.contact{
  margin-top:40px;
  font-size:15px;
}

.contact a{
  color:#7fd6b7;
  text-decoration:none;
}

.footer{
  margin-top:48px;
  font-size:13px;
  color:#707070;
}

@media(max-width:768px){

  .card{
    padding:40px 28px;
  }

  h1{
    font-size:38px;
  }

  p{
    font-size:16px;
  }

}

</style>
</head>
<body>

<div class="card">

  <div class="logo">L</div>

  <h1>Leanopedija</h1>

  <p>
    Praktični vodiči, alati i znanje za Lean proizvodnju.<br>
    Projekt je trenutno u izradi i uskoro postaje dostupan.
  </p>

  <div class="badge">
    Uskoro dostupno
  </div>

  <div class="contact">
    Kontakt:
    <a href="mailto:info@opticora.hr">
      info@opticora.hr
    </a>
  </div>

  <div class="footer">
    Leanopedija by OptiCora
  </div>

</div>

</body>
</html>
